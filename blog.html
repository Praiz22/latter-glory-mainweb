<!DOCTYPE html>
<html lang="
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Latter Glory Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="blogstyle.css">
    <link rel="stylesheet" href="editorial-ui.css">
    <link rel="stylesheet" href="blogstyle-modern.css">
</head>
<body data-theme="dark">

    <div class="antigravity-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div id="loader">
        <div class="loader-container">
            <img src="latter-glory-logo.webp" alt="LGA Logo" class="loader-logo" id="loaderLogo">
            <div class="loader-subtext">LGA BLOG</div>
            <div class="loader-catchphrase">Initiating Antigravity Engine...</div>
        </div>
    </div>

    <nav>
        <div class="logo">
            <img src="latter-glory-logo.webp" alt="LGA">
            <span>LGA</span>
        </div>
        <div class="nav-links">
            <!-- Removed unstyled filters as requested -->
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <i class="bi bi-moon-stars-fill" id="themeBtn" style="cursor:pointer" onclick="toggleTheme()"></i>
            <span style="width:1px; height:20px; background:var(--glass-border)"></span>
            <i class="bi bi-search" id="searchIcon" style="cursor:pointer; font-size:1.3rem;" onclick="toggleSearch()"></i>
        </div>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>
    <script src="admin-modal.js"></script>
    <script src="blog.js"></script>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="search-overlay" style="display:none;">
            <div class="search-container">
                <i class="bi bi-search"></i>
                <input type="text" id="globalSearch" placeholder="Search posts, categories, authors...">
                <button class="search-clear" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.2rem; opacity:0.6; transition:all 0.3s;">×</button>
            </div>
    </div>

    <section class="carousel-section">
        <div class="carousel-container" id="heroCarousel"></div>
        <div class="carousel-nav" id="carouselNav"></div>
    </section>

    <div class="content-wrapper">
        <main>
            <div class="blog-grid" id="mainBlogGrid"></div>
        </main>

        <aside class="sidebar">
            <div class="widget">
                <h4>
                    <i class="bi bi-fire fire-icon"></i> 
                    Popular Right Now
                </h4>
                <div id="popularList"></div>
            </div>

            <div class="widget">
                <h4>
                    <i class="bi bi-calendar-event"></i> 
                    School Calendar
                </h4>
                <div id="eventList"></div>
            </div>
        </aside>
    </div>
      <div class="widget">
                <h4>
                    <i class="bi bi-envelope"></i> 
                    Newsletter
                </h4>
                <div class="newsletter-form">
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:16px;">Stay updated with our latest news and events</p>
                    <div style="display:flex; gap:8px; margin-bottom:12px;">
                        <input type="email" id="newsletterEmail" placeholder="Your email address" style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-primary); outline:none;">
                        <button id="subscribeBtn" style="padding:12px 20px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer; transition:all 0.3s;">Subscribe</button>
                    </div>
                    <p id="newsletterStatus" style="font-size:0.8rem; color:var(--text-muted); min-height:18px;"></p>
                </div>
            </div>


    <footer>
        <p>&copy; 2026 <strong>Latter Glory Academy</strong> • Ogbomoso, Nigeria</p>
        <button id="adminBtn" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem; margin-top:8px; font-weight:500;" onclick="openAdminModal()">
            <i class="bi bi-gear" style="margin-right:4px;"></i>Admin
        </button>
    </footer>

    <!-- Scripts -->

</body>
</html>
