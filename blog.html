<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="googlebot" content="index, follow">
    <meta name="author" content="Latter Glory Academy">
    <meta name="description" content="Official Blog of Latter Glory Academy - Insights into academic excellence, school culture, and student success stories from Ogbomoso's leading school.">
    <meta name="keywords" content="Latter Glory Academy Blog, school news Ogbomoso, Nigerian education, student success, LGA stories">
    
    <!-- Open Graph (Facebook/LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="LGA Blog | Building Tomorrow's Leaders">
    <meta property="og:description" content="Discover the latest news, academic insights, and success stories from Latter Glory Academy.">
    <meta property="og:url" content="https://www.latterglory.com.ng/blog.html">
    <meta property="og:site_name" content="Latter Glory Academy">
    <meta property="og:image" content="https://www.latterglory.com.ng/latter-glory-logo.svg">
    
    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LGA Blog | Academic Excellence & School Culture">
    <meta name="twitter:description" content="Join the conversation at Latter Glory Academy.">
    <meta name="twitter:image" content="https://www.latterglory.com.ng/latter-glory-logo.svg">

    <title>Blog | Latter Glory Academy - Insights & Excellence</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="latter-glory-logo.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="canonical" href="https://www.latterglory.com.ng/blog.html">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "Latter Glory Academy Blog",
      "description": "Insights and stories from LGA",
      "publisher": {
        "@type": "EducationalOrganization",
        "name": "Latter Glory Academy",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.latterglory.com.ng/latter-glory-logo.svg"
        }
      }
    }
    </script>

    <!-- Critical Styles (Local First) -->
    <link rel="stylesheet" href="blogstyle.css">
    <link rel="stylesheet" href="editorial-ui.css">
    <link rel="stylesheet" href="blogstyle-modern.css">

    <!-- Non-critical External Assets (Optimized) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <noscript>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    </noscript>
</head>
<body data-theme="dark">

    <!-- Background strictly set to pure black via body CSS -->

    <!-- Preloader removed per user request -->

    <nav>
        <div class="logo">
            <img src="latter-glory-logo.svg" alt="LGA">
            <span>LGA</span>
        </div>
        <div class="nav-links">
            <!-- Removed unstyled filters as requested -->
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <i class="bi bi-moon-stars-fill" id="themeBtn" style="cursor:pointer" onclick="toggleTheme()"></i>
            <span style="width:1px; height:20px; background:var(--glass-border)"></span>
            <i class="bi bi-search" id="searchIcon" style="cursor:pointer; font-size:1.3rem;"></i>
        </div>
    </nav>

    <!-- Core Scripts (Optimized) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="config.js" defer></script>
    <script src="supabase-init.js" defer></script>
    <script src="admin-modal.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="blog.js" defer></script>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="search-overlay">
            <div class="search-container">
                <i class="bi bi-search"></i>
                <input type="text" id="globalSearch" placeholder="Search posts, categories, authors..." autocomplete="off">
                <button id="closeSearch" class="search-clear">×</button>
            </div>
            <div id="searchResults" class="search-results-list"></div>
    </div>

    <section class="carousel-section">
        <div class="carousel-container" id="heroCarousel"></div>
        <div class="carousel-nav" id="carouselNav"></div>
    </section>

    <div class="content-wrapper">
        <main>
            <div class="blog-grid" id="mainBlogGrid"></div>
        </main>

        <aside class="sidebar">
            <div class="widget popular-widget">
                <h4>
                    <i class="bi bi-fire fire-icon"></i> 
                    Popular Right Now
                </h4>
                <div id="popularList"></div>
            </div>

            <div class="widget">
                <h4>
                    <i class="bi bi-calendar-event"></i> 
                    School Calendar
                </h4>
                <div id="eventList"></div>
            </div>
        </aside>
    </div>
    <section class="school-updates-section">
        <div class="content-wrapper">
            <h2 class="section-title"><i class="bi bi-megaphone"></i> School Notifications & Events</h2>
            <div class="updates-grid" id="schoolUpdatesGrid">
                <!-- Data populated via blog.js -->
            </div>
        </div>
    </section>

    <div class="newsletter-card-modern">
            <h4><i class="bi bi-envelope-paper-heart" style="color:var(--primary); margin-right:10px;"></i>Stay with the Glory </h4>
            <p style="color:rgba(255,255,255,0.6); font-size:1rem;">Get the latest insights and news from Latter Glory Academy.</p>
            <div class="newsletter-form-container">
                <input type="email" id="newsletterEmail" class="newsletter-input" placeholder="Enter your email">
                <button id="subscribeBtn" class="apple-btn" onclick="handleNewsletter()">Subscribe</button>
            </div>
            <p id="newsletterStatus" style="font-size:0.85rem; margin-top:15px; min-height:20px;"></p>
        </div>


    <footer>
        <p>&copy; 2026 <strong>Latter Glory Academy</strong> • Ogbomoso, Nigeria | Developed by <a href="https://praixtech.netlify.app" target="_blank" rel="noopener" style="color:var(--primary); text-decoration:none; font-weight:600;">PraixTech</a></p>
        <button id="adminBtn" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem; margin-top:8px; font-weight:500;" onclick="openAdminModal()">
            <i class="bi bi-gear" style="margin-right:4px;"></i>Admin
        </button>
    </footer>

    <!-- Scripts -->

</body>
</html>
