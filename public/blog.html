<!DOCTYPE html>
<html lang="
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Latter Glory Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="blogstyle.css">
    <link rel="stylesheet" href="editorial-ui.css">
    <link rel="stylesheet" href="blogstyle-modern.css">
</head>
<body data-theme="dark">

    <!-- Background strictly set to pure black via body CSS -->

    <div id="loader">
        <div class="loader-container">
            <img src="latter-glory-logo.webp" alt="LGA Logo" class="loader-logo" id="loaderLogo">
            <div class="loader-subtext">LGA BLOG</div>
            <div class="loader-catchphrase">Initiating Antigravity Engine...</div>
        </div>
    </div>

    <nav>
        <div class="logo">
            <img src="latter-glory-logo.webp" alt="LGA">
            <span>LGA</span>
        </div>
        <div class="nav-links">
            <!-- Removed unstyled filters as requested -->
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <i class="bi bi-moon-stars-fill" id="themeBtn" style="cursor:pointer" onclick="toggleTheme()"></i>
            <span style="width:1px; height:20px; background:var(--glass-border)"></span>
            <i class="bi bi-search" id="searchIcon" style="cursor:pointer; font-size:1.3rem;"></i>
        </div>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>
    <script src="admin-modal.js"></script>
    <script src="blog.js"></script>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="search-overlay">
            <div class="search-container">
                <i class="bi bi-search"></i>
                <input type="text" id="globalSearch" placeholder="Search posts, categories, authors..." autocomplete="off">
                <button id="closeSearch" class="search-clear">×</button>
            </div>
            <div id="searchResults" class="search-results-list"></div>
    </div>

    <section class="carousel-section">
        <div class="carousel-container" id="heroCarousel"></div>
        <div class="carousel-nav" id="carouselNav"></div>
    </section>

    <div class="content-wrapper">
        <main>
            <div class="blog-grid" id="mainBlogGrid"></div>
        </main>

        <aside class="sidebar">
            <div class="widget popular-widget">
                <h4>
                    <i class="bi bi-fire fire-icon"></i> 
                    Popular Right Now
                </h4>
                <div id="popularList"></div>
            </div>

            <div class="widget">
                <h4>
                    <i class="bi bi-calendar-event"></i> 
                    School Calendar
                </h4>
                <div id="eventList"></div>
            </div>
        </aside>
    </div>
        <div class="newsletter-card-modern">
            <h4><i class="bi bi-envelope-paper-heart" style="color:var(--primary); margin-right:10px;"></i>Stay with the Glory </h4>
            <p style="color:rgba(255,255,255,0.6); font-size:1rem;">Get the latest insights and news from Latter Glory Academy.</p>
            <div class="newsletter-form-container">
                <input type="email" id="newsletterEmail" class="newsletter-input" placeholder="Enter your email">
                <button id="subscribeBtn" class="apple-btn" onclick="handleNewsletter()">Subscribe</button>
            </div>
            <p id="newsletterStatus" style="font-size:0.85rem; margin-top:15px; min-height:20px;"></p>
        </div>


    <footer>
        <p>&copy; 2026 <strong>Latter Glory Academy</strong> • Ogbomoso, Nigeria</p>
        <button id="adminBtn" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem; margin-top:8px; font-weight:500;" onclick="openAdminModal()">
            <i class="bi bi-gear" style="margin-right:4px;"></i>Admin
        </button>
    </footer>

    <!-- Scripts -->

</body>
</html>
