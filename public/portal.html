<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Latter Glory Academy | Student Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Latter Glory School Student Portal - Access assignments, CBT, and student community.">
    <link rel="icon" href="latter-glory-logo.png">
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Icons & CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="portal-style.css">
</head>
<body>

    <!-- 1. AUTH SECTION (Login Modal Restoration) -->
    <div id="authSection" class="auth-wrapper d-none">
        <div class="auth-card">
            <div class="text-center mb-5">
                <div class="logo-placeholder mx-auto mb-3" id="authLogoContainer">
                   <img src="latter-glory-logo.webp" alt="LGA Logo" width="80" class="rounded-3" onerror="this.parentElement.innerHTML='<div class=\'lga-letter-logo\'>LGA</div>'">
                </div>
                <h2 class="fw-800">Student Portal</h2>
                <p class="text-muted">Sign in to access your dashboard</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="small text-muted mb-2 text-uppercase fw-600">Email Address</label>
                    <input type="email" class="form-control-lga" id="loginEmail" placeholder="name@school.com" required>
                </div>
                <div class="mb-4">
                    <label class="small text-muted mb-2 text-uppercase fw-600">Password</label>
                    <input type="password" class="form-control-lga" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary-lga" id="authBtn">Sign In</button>
            </form>
            <div id="authError" class="text-danger small mt-3 text-center"></div>
        </div>
    </div>

    <!-- 2. PORTAL SECTION -->
    <div id="portalSection" class="portal-wrapper d-none">
        <!-- Sidebar Navigation -->
        <aside class="portal-sidebar" id="sidebar">
            <a href="#" class="sidebar-logo">
                <div class="sidebar-logo-img">
                    <img src="latter-glory-logo.webp" alt="LGA" onerror="this.parentElement.innerHTML='<div class=\'lga-small-logo\'>L</div>'">
                </div>
                <span>LGA PORTAL</span>
            </a>

            <nav class="nav-links">
                <div class="nav-item">
                    <a href="#" class="nav-link-btn active" data-tab="dashboard">
                        <i class="bi bi-columns-gap"></i> Dashboard
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link-btn" data-tab="assignments">
                        <i class="bi bi-journal-check"></i> Assignments
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link-btn" data-tab="chat">
                        <i class="bi bi-chat-text"></i> Global Chat
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link-btn" data-tab="results">
                        <i class="bi bi-mortarboard"></i> Results
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer mt-auto">
                <button class="nav-link-btn w-100 border-0 bg-transparent text-danger" id="logoutBtn">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="portal-main">
            <!-- Header -->
            <header class="content-header">
                <div>
                    <h2 class="fw-800 mb-1" id="greetingText">Dashboard</h2>
                    <p class="text-muted mb-0" id="currentDateDisplay"></p>
                </div>
                <!-- Profile Indicator -->
                <div class="d-flex align-items-center gap-3">
                    <div class="text-end d-none d-md-block">
                        <div class="fw-600 mb-0" id="userName">Student Name</div>
                        <div class="text-muted smaller" id="userClass">Class Group</div>
                    </div>
                    <div class="avatar-container" id="avatarContainer">
                        <img id="userAvatar" src="latter-glory-logo.webp" alt="Profile" style="width:48px; height:48px; border-radius:14px; border:2px solid var(--card-border);" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky'">
                    </div>
                </div>
            </header>

            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard" class="portal-view">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="value" id="pointsDisplay">0</div>
                        <div class="label">Academic Points</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="rankDisplay">--</div>
                        <div class="label">Class Rank</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="completedCount">0</div>
                        <div class="label">Submissions</div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="lga-card">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h4 class="fw-800 mb-0">Active Assignments</h4>
                                <button class="btn btn-sm btn-link text-primary text-decoration-none" onclick="switchTab('assignments')">View All</button>
                            </div>
                            <div id="recentAssignmentsList">
                                <p class="text-muted">Checking for new tasks...</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="lga-card h-100">
                            <h4 class="fw-800 mb-4">Community</h4>
                            <div id="onlinePeersList">
                                <p class="text-muted smaller">No one else is online.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ASSIGNMENTS VIEW -->
            <div id="view-assignments" class="portal-view d-none">
                <h3 class="fw-800 mb-4">Assignments</h3>
                <div id="fullAssignmentsList"></div>
            </div>

            <!-- CHAT VIEW -->
            <div id="view-chat" class="portal-view d-none">
                <div class="chat-container">
                    <div class="chat-sidebar d-none d-md-block">
                        <h6 class="text-muted text-uppercase smaller fw-bold mb-4">Online Now</h6>
                        <div id="chatPeersList"></div>
                    </div>
                    <div class="chat-content">
                        <div class="chat-messages" id="chatArea"></div>
                        <form class="chat-input-area" id="chatForm">
                            <input type="text" class="chat-input" id="chatInput" placeholder="Write a message..." required autocomplete="off">
                            <button type="submit" class="btn btn-primary-lga" style="width: auto; padding: 14px 24px;">
                                <i class="bi bi-send-fill"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav" id="mobileNav">
        <a href="#" class="mobile-nav-item active" data-tab="dashboard">
            <i class="bi bi-columns-gap"></i>
        </a>
        <a href="#" class="mobile-nav-item" data-tab="assignments">
            <i class="bi bi-journal-check"></i>
        </a>
        <a href="#" class="mobile-nav-item" data-tab="chat">
            <i class="bi bi-chat-text"></i>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- We must use a local server for these modules -->
    <script type="module" src="supabase-init.js"></script>
    <script type="module" src="portal.js"></script>

    <script>
        document.getElementById('currentDateDisplay').textContent = new Date().toLocaleDateString('en-GB', {
            weekday: 'long', day: 'numeric', month: 'long'
        });

        function switchTab(tabId) {
            document.querySelectorAll('.portal-view').forEach(v => v.classList.add('d-none'));
            const target = document.getElementById(`view-${tabId}`);
            if (target) target.classList.remove('d-none');

            document.querySelectorAll('.nav-link-btn, .mobile-nav-item').forEach(l => {
                if(l.dataset.tab === tabId) l.classList.add('active');
                else l.classList.remove('active');
            });
            
            const headerTitle = document.getElementById('greetingText');
            if(headerTitle) headerTitle.textContent = tabId.charAt(0).toUpperCase() + tabId.slice(1);
        }

        document.querySelectorAll('.nav-link-btn, .mobile-nav-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                switchTab(btn.dataset.tab);
            });
        });
    </script>
</body>
</html>
